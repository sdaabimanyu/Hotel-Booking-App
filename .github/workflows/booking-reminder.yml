name: Upcoming Booking Reminder

on:
  schedule:
    # Runs every day at 2:30 AM UTC (8:00 AM IST)
    - cron: "30 2 * * *"

  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Call Upcoming Booking Reminder API
        run: |
          curl --request GET \
          "${{ secrets.REMINDER_API_URL }}" \
          --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
