name: Upcoming Booking Reminder

on:
  schedule:
    # Runs every day at 2:30 AM UTC (8:00 AM IST)
    - cron: "30 2 * * *"

  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Call Upcoming Booking Reminder API
        run: |
          echo "Calling Reminder API..."

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            --request GET \
            "${{ secrets.REMINDER_API_URL }}" \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "$RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d':' -f2)

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Reminder API failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Reminder API executed successfully."
